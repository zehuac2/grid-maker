name: Deploy to GitHub Pages

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run check
        run: bun run check
        working-directory: ./web

      - name: Run tests
        run: bun run test
        working-directory: ./web

      - name: Build the app
        run: bun run build
        working-directory: ./web

      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
