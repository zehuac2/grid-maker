name: PR Build Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run check
        run: bun run check
        working-directory: ./web

      - name: Run tests
        run: bun run test
        working-directory: ./web

      - name: Build the app
        run: bun run build
        working-directory: ./web
